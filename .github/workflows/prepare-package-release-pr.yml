name: "Prepare Package Release PR"

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to release, for example one tool.uv.workspace member"
        required: true
        type: string
      version:
        description: "New canonical package version, for example 0.1.5"
        required: true
        type: string
      update_dependent_bounds:
        description: "Update lower bounds in workspace packages that depend on this package"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-package-release-pr-${{ inputs.package }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-package-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install release tooling
        run: pip install packaging

      - name: Prepare package release metadata
        run: |
          args=(
            --package "${{ inputs.package }}"
            --version "${{ inputs.version }}"
          )
          if [[ "${{ inputs.update_dependent_bounds }}" == "true" ]]; then
            args+=(--update-dependent-bounds)
          else
            args+=(--no-update-dependent-bounds)
          fi
          python3 ci/prepare_package_release.py "${args[@]}"

      - name: Check package release readiness
        run: |
          python3 ci/check_package_release_readiness.py \
            --package "${{ inputs.package }}" \
            --expected-version "${{ inputs.version }}" \
            --check-tag-available \
            --check-dependent-bounds \
            --build

      - name: Check generated diff
        run: git diff --check

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ inputs.version }}
          UPDATE_DEPENDENT_BOUNDS: ${{ inputs.update_dependent_bounds }}
        run: |
          set -euo pipefail

          branch="release/${PACKAGE}-${VERSION}"
          title="[Tool] Prepare ${PACKAGE} ${VERSION}"
          body_file="$(mktemp)"
          cat > "${body_file}" <<EOF
          ## Why

          Prepare package-level release metadata for ${PACKAGE} ${VERSION}.

          ## Solution

          - update ${PACKAGE} package version
          - update workspace dependent lower bounds: ${UPDATE_DEPENDENT_BOUNDS}

          ## Test Cases

          - generated by \`python3 ci/prepare_package_release.py --package ${PACKAGE} --version ${VERSION}\`
          - validated by \`python3 ci/check_package_release_readiness.py --package ${PACKAGE} --expected-version ${VERSION} --check-tag-available --check-dependent-bounds --build\`
          - validated by \`git diff --check\`

          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B "${branch}"
          git add */pyproject.toml
          git commit -m "chore: prepare ${PACKAGE} ${VERSION} release"
          git push --force-with-lease origin "${branch}"

          if gh pr view "${branch}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh pr edit "${branch}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body-file "${body_file}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${branch}" \
              --title "${title}" \
              --body-file "${body_file}"
          fi
