name: "Package Release Readiness"

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to validate, for example one tool.uv.workspace member"
        required: true
        type: string
      expected_version:
        description: "Expected package version, for example 0.1.5"
        required: true
        type: string
      check_tag_available:
        description: "Fail if <package>-v<expected-version> already exists"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      expected_version:
        required: true
        type: string
      check_tag_available:
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  package-release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install release check dependencies
        run: pip install packaging

      - name: Check package release readiness
        run: |
          args=(
            --package "${{ inputs.package }}"
            --expected-version "${{ inputs.expected_version }}"
            --check-dependent-bounds
            --build
          )
          if [[ "${{ inputs.check_tag_available }}" == "true" ]]; then
            args+=(--check-tag-available)
          fi
          python3 ci/check_package_release_readiness.py "${args[@]}"
